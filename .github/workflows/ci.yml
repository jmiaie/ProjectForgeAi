name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/projectforge-password
        ports:
          - 7687:7687

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: projectforge-password
      ENCRYPTION_KEY: ci-test-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for Neo4j
        run: |
          for i in $(seq 1 30); do
            python3 - <<'PY'
          from neo4j import GraphDatabase
          import os, sys
          uri = os.environ["NEO4J_URI"]
          auth = (os.environ["NEO4J_USER"], os.environ["NEO4J_PASSWORD"])
          try:
              driver = GraphDatabase.driver(uri, auth=auth)
              driver.verify_connectivity()
              driver.close()
              sys.exit(0)
          except Exception:
              sys.exit(1)
          PY
            && exit 0
            sleep 2
          done
          echo "Neo4j did not become ready in time"
          exit 1

      - name: Run unit tests
        run: PYTHONPATH=backend/app python3 -m unittest discover -s backend/app/tests

      - name: Portfolio intelligence smoke
        run: python3 scripts/smoke_portfolio_intelligence.py

      - name: Build air-gap bundle (source-only)
        run: python3 scripts/build_airgap_bundle.py --version 14.0.0-ci --skip-wheels

      - name: Verify graph schema version docs
        run: python3 scripts/check_graph_schema_version.py

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Render Helm chart
        run: helm template projectforge ./deploy/helm/projectforge > /tmp/projectforge.yaml

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and typecheck
        working-directory: frontend
        run: |
          npm install
          npm run typecheck
