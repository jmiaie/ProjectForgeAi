name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt
      - run: python -m pytest backend/tests -q
        env:
          DATABASE_URL: sqlite+aiosqlite:////tmp/projectforge_ci.db
          ENCRYPTION_KEY: test-only-not-secure-32bytes-min!!
          JWT_SECRET: test-only-not-secure-jwt-secret-48b!!
          AUTO_CREATE_SCHEMA: "true"
          GRAPH_BACKEND: memory

  forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  smoke-forge:
    runs-on: ubuntu-latest
    needs: forge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run forge -- validate --spec ./examples/specs/api-service.json
      - run: npm run forge -- run --recipe minimal --output ./tmp-forge-output --name ci-smoke
      - run: npm run forge -- run --spec ./examples/specs/api-service.json --output ./tmp-api-output
      - run: test -f ./tmp-api-output/src/server.js
      - run: grep -q orders-api ./tmp-api-output/src/server.js
