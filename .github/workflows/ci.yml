name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  smoke-forge:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run forge -- run --recipe minimal --output ./tmp-forge-output --name ci-smoke
      - run: test -f ./tmp-forge-output/forge.manifest.json
      - run: test -f ./tmp-forge-output/README.md
      - run: grep -q ci-smoke ./tmp-forge-output/README.md
