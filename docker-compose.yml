services:
  backend:
    image: python:3.12-slim
    working_dir: /workspace/backend/app
    volumes:
      - .:/workspace
    env_file:
      - .env.example
    environment:
      PYTHONPATH: /workspace/backend/app
    command: >
      sh -c "pip install --no-cache-dir -r /workspace/requirements.txt &&
             uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - neo4j

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: projectforge
      POSTGRES_PASSWORD: projectforge
      POSTGRES_DB: projectforge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/projectforge-password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

volumes:
  postgres-data:
  neo4j-data:
