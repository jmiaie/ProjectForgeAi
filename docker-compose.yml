services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: projectforge-ai/backend:dev
    container_name: projectforge-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - locus_data:/app/.locus
      - ompa_data:/app/vaults
    depends_on:
      - postgres
      - neo4j
      - redis

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: projectforge-ai/frontend:dev
    container_name: projectforge-frontend
    environment:
      API_PROXY_TARGET: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: ""
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: projectforge-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: projectforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    container_name: projectforge-neo4j
    environment:
      NEO4J_AUTH: neo4j/projectforge
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7
    container_name: projectforge-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  neo4j_data:
  locus_data:
  ompa_data:
