services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /srv/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    volumes:
      - ./backend:/srv/backend
      - ./.env.example:/srv/backend/.env
    depends_on:
      - postgres
      - neo4j

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: projectforge
      POSTGRES_USER: projectforge
      POSTGRES_PASSWORD: projectforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/projectforge
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

volumes:
  pgdata:
  neo4jdata:
