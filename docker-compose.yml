services:
  backend:
    image: python:3.12-slim
    working_dir: /workspace/backend/app
    volumes:
      - .:/workspace
    env_file:
      - .env.example
    environment:
      PYTHONPATH: /workspace/backend/app
      TEMPORAL_ADDRESS: temporal:7233
    command: >
      sh -c "pip install --no-cache-dir -r /workspace/requirements.txt &&
             uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - neo4j
      - temporal

  automation-worker:
    image: python:3.12-slim
    working_dir: /workspace/backend/app
    volumes:
      - .:/workspace
    env_file:
      - .env.example
    environment:
      PYTHONPATH: /workspace/backend/app
      TEMPORAL_ADDRESS: temporal:7233
    command: >
      sh -c "pip install --no-cache-dir -r /workspace/requirements.txt &&
             python -m automations.worker_main"
    depends_on:
      - temporal
      - backend

  frontend:
    image: node:22-slim
    working_dir: /workspace/frontend
    volumes:
      - .:/workspace
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_DEFAULT_PROJECT_ID: proj_123
    command: >
      sh -c "npm install &&
             npm run dev -- --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: projectforge
      POSTGRES_PASSWORD: projectforge
      POSTGRES_DB: projectforge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/projectforge-password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  temporal:
    image: temporalio/auto-setup:1.25.2
    ports:
      - "7233:7233"
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: projectforge
      POSTGRES_PWD: projectforge
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    depends_on:
      - postgres

volumes:
  postgres-data:
  neo4j-data:
