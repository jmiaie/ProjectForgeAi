apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "projectforge.fullname" . }}-backend
  labels:
    {{- include "projectforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "projectforge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "projectforge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: {{ .Values.backend.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          workingDir: /workspace/backend/app
          command:
            - sh
            - -c
            - pip install --no-cache-dir -r /workspace/requirements.txt && uvicorn main:app --host 0.0.0.0 --port {{ .Values.backend.port }} --workers 2
          ports:
            - containerPort: {{ .Values.backend.port }}
          envFrom:
            - configMapRef:
                name: {{ include "projectforge.fullname" . }}-config
            - secretRef:
                name: {{ include "projectforge.fullname" . }}-secrets
          env:
            - name: PYTHONPATH
              value: /workspace/backend/app
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "projectforge.fullname" . }}-backend
  labels:
    {{- include "projectforge.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "projectforge.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
      name: http
