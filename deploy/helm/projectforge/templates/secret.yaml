apiVersion: v1
kind: Secret
metadata:
  name: {{ include "projectforge.fullname" . }}-secrets
  labels:
    {{- include "projectforge.labels" . | nindent 4 }}
type: Opaque
stringData:
  ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | default (randAlphaNum 32) | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | default (randAlphaNum 48) | quote }}
  GROQ_API_KEY: {{ .Values.secrets.groqApiKey | default "" | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | default "" | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | default "" | quote }}
  {{- if .Values.postgresql.enabled }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
  {{- end }}
  {{- if .Values.neo4j.enabled }}
  NEO4J_PASSWORD: {{ .Values.neo4j.auth.password | quote }}
  {{- end }}
