apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "projectforge.fullname" . }}-frontend
  labels:
    {{- include "projectforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "projectforge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "projectforge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: {{ .Values.frontend.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          workingDir: /workspace/frontend
          command:
            - sh
            - -c
            - npm install && npm run build && npm run start -- --hostname 0.0.0.0 --port {{ .Values.frontend.port }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
          envFrom:
            - configMapRef:
                name: {{ include "projectforge.fullname" . }}-config
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "projectforge.fullname" . }}-frontend
  labels:
    {{- include "projectforge.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "projectforge.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
      name: http
