{{- if .Values.neo4j.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "projectforge.neo4j.fullname" . }}
  labels:
    {{- include "projectforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
spec:
  ports:
    - port: {{ .Values.neo4j.service.httpPort }}
      targetPort: http
      name: http
    - port: {{ .Values.neo4j.service.boltPort }}
      targetPort: bolt
      name: bolt
  selector:
    app.kubernetes.io/name: {{ include "projectforge.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: neo4j
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "projectforge.neo4j.fullname" . }}
  labels:
    {{- include "projectforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
spec:
  serviceName: {{ include "projectforge.neo4j.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "projectforge.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: neo4j
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "projectforge.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: neo4j
    spec:
      containers:
        - name: neo4j
          image: {{ include "projectforge.image" (dict "Values" .Values "repository" .Values.neo4j.image.repository "tag" .Values.neo4j.image.tag) }}
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              value: {{ printf "neo4j/%s" .Values.neo4j.auth.password | quote }}
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
  {{- if .Values.neo4j.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.neo4j.persistence.size }}
        {{- if .Values.neo4j.persistence.storageClass }}
        storageClassName: {{ .Values.neo4j.persistence.storageClass | quote }}
        {{- end }}
  {{- else }}
      volumes:
        - name: data
          emptyDir: {}
  {{- end }}
{{- end }}
